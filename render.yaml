services:
  - type: web
    name: planner-ai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # set manually in Render dashboard
      - key: HF_API_KEY
        sync: false   # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL after deployment
